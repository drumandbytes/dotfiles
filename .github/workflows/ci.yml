name: CI

on:
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck run_once_*.sh run_onchange_*.sh

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: sudo apt-get install -y shfmt
      - name: Check formatting
        # -d prints a diff and exits non-zero if any file differs; -i 4 = 4-space indent
        run: shfmt -d -i 4 run_once_*.sh run_onchange_*.sh

  chezmoi-templates:
    name: chezmoi templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
      - name: Validate templates
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.toml <<'EOF'
          [data]
            bitwarden     = false
            bw_email      = "test@example.com"
            touch_id_sudo = false
            docker        = false
            kubernetes    = false
            java          = false
          EOF

          failed=0
          # Skip .chezmoi.toml.tmpl — it uses promptBoolOnce which requires interaction
          while IFS= read -r f; do
            echo "→ $f"
            chezmoi execute-template < "$f" > /dev/null || { echo "FAILED: $f"; failed=1; }
          done < <(find . -name '*.tmpl' ! -name '.chezmoi.toml.tmpl' ! -path './.git/*')
          exit "$failed"

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
